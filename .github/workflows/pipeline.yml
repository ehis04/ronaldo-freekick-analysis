# pipeline.yml — weekly data pipeline, commits updated prod JSON to repo.
# Not fully active until Phase 5 scrapers are complete.

name: Data Pipeline

on:
  schedule:
    - cron: "0 6 * * 0"
  workflow_dispatch:

jobs:
  run-pipeline:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: pipeline/requirements.txt

      - name: Install Python dependencies
        run: pip install -r pipeline/requirements.txt

      - name: Install Playwright browsers
        run: playwright install chromium --with-deps

      - name: Run pipeline
        env:
          PIPELINE_ENV: prod
          DB_PATH: ./pipeline/db/ronaldo_freekicks.duckdb
          DATA_OUTPUT_PATH: ./frontend/public/data
          LOG_LEVEL: INFO
          FBREF_RATE_LIMIT_SECONDS: ${{ vars.FBREF_RATE_LIMIT_SECONDS || 3 }}
          WHOSCORED_RATE_LIMIT_SECONDS: ${{ vars.WHOSCORED_RATE_LIMIT_SECONDS || 10 }}
          SOFASCORE_RATE_LIMIT_SECONDS: ${{ vars.SOFASCORE_RATE_LIMIT_SECONDS || 5 }}
          UNDERSTAT_RATE_LIMIT_SECONDS: ${{ vars.UNDERSTAT_RATE_LIMIT_SECONDS || 2 }}
          TRANSFERMARKT_RATE_LIMIT_SECONDS: ${{ vars.TRANSFERMARKT_RATE_LIMIT_SECONDS || 3 }}
        run: python pipeline/run_pipeline.py

      - name: Commit updated JSON files
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add frontend/public/data/prod/
          git diff --staged --quiet || git commit -m "chore(data): pipeline run $(date -u +'%Y-%m-%d %H:%M UTC')"
          git push